name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup keystore
        id: keystore
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          b64='${{ secrets.KEYSTORE_BASE64 }}'
          echo "b64_len=${#b64}" >> "$GITHUB_OUTPUT"
          if [ -n "$b64" ]; then
            echo "using_secret=true" >> "$GITHUB_OUTPUT"
            printf '%s' "$b64" > /tmp/keystore.b64
            base64 --decode /tmp/keystore.b64 > /tmp/keystore.jks || {
              echo "decode_status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            }
            echo "decode_status=ok" >> "$GITHUB_OUTPUT"
            echo "file_size=$(wc -c < /tmp/keystore.jks)" >> "$GITHUB_OUTPUT"
            echo "path=/tmp/keystore.jks" >> "$GITHUB_OUTPUT"
            echo "password=$STORE_PASSWORD" >> "$GITHUB_OUTPUT"
            echo "alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"
            echo "keypass=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"
          else
            echo "using_secret=false" >> "$GITHUB_OUTPUT"
            keytool -genkey -v -keystore /tmp/ci.jks -alias ci -keyalg RSA -keysize 2048 \
              -validity 10000 -storepass ci123 -keypass ci123 \
              -dname "CN=CI, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
            echo "decode_status=keytool" >> "$GITHUB_OUTPUT"
            echo "path=/tmp/ci.jks" >> "$GITHUB_OUTPUT"
            echo "password=ci123" >> "$GITHUB_OUTPUT"
            echo "alias=ci" >> "$GITHUB_OUTPUT"
            echo "keypass=ci123" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug outputs
        if: always()
        run: |
          echo "b64_len: ${{ steps.keystore.outputs.b64_len }}"
          echo "using_secret: ${{ steps.keystore.outputs.using_secret }}"
          echo "decode_status: ${{ steps.keystore.outputs.decode_status }}"
          echo "file_size: ${{ steps.keystore.outputs.file_size }}"

      - name: Build release APK
        env:
          CI_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          STORE_PASSWORD: ${{ steps.keystore.outputs.password }}
          KEY_ALIAS: ${{ steps.keystore.outputs.alias }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.keypass }}
        run: ./gradlew assembleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true

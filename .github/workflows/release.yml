name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          echo "STORE_PASSWORD length: ${#STORE_PASSWORD}"
          echo "KEY_ALIAS length: ${#KEY_ALIAS}"
          echo "KEY_PASSWORD length: ${#KEY_PASSWORD}"
          echo "KEYSTORE_BASE64 first 50 chars: ${KEYSTORE_BASE64:0:50}"

      - name: Setup keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > /tmp/keystore.jks || {
              echo "base64 decode failed"
              exit 1
            }
            echo "path=/tmp/keystore.jks" >> "$GITHUB_OUTPUT"
            echo "password=${{ secrets.STORE_PASSWORD }}" >> "$GITHUB_OUTPUT"
            echo "alias=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_OUTPUT"
            echo "keypass=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_OUTPUT"
          else
            keytool -genkey -v -keystore /tmp/ci.jks -alias ci -keyalg RSA -keysize 2048 \
              -validity 10000 -storepass ci123 -keypass ci123 \
              -dname "CN=CI, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
            echo "path=/tmp/ci.jks" >> "$GITHUB_OUTPUT"
            echo "password=ci123" >> "$GITHUB_OUTPUT"
            echo "alias=ci" >> "$GITHUB_OUTPUT"
            echo "keypass=ci123" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        env:
          CI_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          STORE_PASSWORD: ${{ steps.keystore.outputs.password }}
          KEY_ALIAS: ${{ steps.keystore.outputs.alias }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.keypass }}
        run: ./gradlew assembleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true

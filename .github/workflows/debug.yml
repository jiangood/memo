name: Debug Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run unit tests
        run: chmod +x gradlew && ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Create and push tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          TAG="v$VERSION"
          if git ls-remote --tags --exit-code origin "$TAG" > /dev/null 2>&1; then
            echo "Tag $TAG already exists on remote, skipping"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag "$TAG"
            git push "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}" "$TAG"
          fi
